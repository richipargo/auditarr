version: '3.8'

services:
  auditarr:
    build: .
    container_name: auditarr
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Mount data directory for persistent database storage
      - ./data:/data
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      - DB_PATH=/data/auditarr.db
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
