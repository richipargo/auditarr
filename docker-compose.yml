version: '3.8'

services:
  auditarr:
    build: .
    container_name: auditarr
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Mount data directory for persistent database storage
      # For production, consider using a named volume instead:
      # - auditarr-data:/data
      - ./data:/data
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      - DB_PATH=/data/auditarr.db

# For production deployments, uncomment the volumes section below
# and replace the bind mount above with:
# - auditarr-data:/data
#
#volumes:
#  auditarr-data:
